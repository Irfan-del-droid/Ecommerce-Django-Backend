databases:
  - name: loki-db
    databaseName: loki
    user: loki_user

services:
  - type: web
    name: loki-backend
    env: python
    buildCommand: "./render_build.sh"
    startCommand: "gunicorn loki_backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: loki-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: CLIENT_URL
        value: https://loki-frontend-vercel.app # Replace with your actual Vercel domain later
